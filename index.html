<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Leny AI - Medical Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root {
        --bg-main: #FAF6F2;
        --bg-sidebar: #FFFFFF;
        --bg-message: #FFFFFF;
        --bg-user-message: #FFF4EC;
        --border: #E8D5C8;
        --border-light: #F2E6DC;
        --text-primary: #2D241F;
        --text-secondary: #5C4A3F;
        --text-meta: #8B7265;
        --accent-orange: #C97A20;
        --accent-blue: #4F7C8A;
        --accent-green: #6B8068;
        --accent-purple: #8B4789;
        --success: #4CAF50;
        --warning: #FF9800;
      }
      
      html, body, #root {
        height: 100%;
        margin: 0;
        padding: 0;
      }
      
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Arial', sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      
      /* Hide scrollbar for Chrome, Safari and Opera */
      .hide-scrollbar::-webkit-scrollbar {
        display: none;
      }
      /* Hide scrollbar for IE, Edge and Firefox */
      .hide-scrollbar {
        -ms-overflow-style: none;  /* IE and Edge */
        scrollbar-width: none;  /* Firefox */
      }
      
      /* Thinking dots animation */
      .thinking-dots span {
        display: inline-block;
        opacity: 0;
        animation: blink 1.4s infinite both;
      }
      .thinking-dots span:nth-child(2) {
        animation-delay: 0.2s;
      }
      .thinking-dots span:nth-child(3) {
        animation-delay: 0.4s;
      }
      @keyframes blink {
        0%, 80%, 100% {
          opacity: 0;
        }
        40% {
          opacity: 1;
        }
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes slideInRight {
        from { opacity: 0; transform: translateX(10px); }
        to { opacity: 1; transform: translateX(0); }
      }
      .animate-fade-in {
        animation: fadeIn 0.8s ease-out both;
      }
      .animate-slide-in-right {
        animation: slideInRight 0.3s cubic-bezier(0.4, 0, 0.2, 1) both;
      }
      
      /* User message styling */
      .message.user {
        display: flex;
        justify-content: flex-end;
        margin-bottom: 16px;
      }
      
      .message.user .message-bubble {
        background: #E89B4C;
        color: white;
        border-radius: 18px;
        border-bottom-right-radius: 4px;
      }
      
      .message-text {
        font-size: 15px;
        line-height: 1.7;
      }
      
      .message-time {
        font-size: 12px;
        opacity: 0.7;
        margin-top: 4px;
      }
      
      /* Medical Formatting - Clean & Simple */
      
      /* Medication doses - soft blue pills */
      .medication-dose {
        background: linear-gradient(135deg, #E6F3FF 0%, #D6EBFF 100%);
        color: #0066CC;
        padding: 2px 8px;
        border-radius: 12px;
        font-weight: 600;
        font-family: -apple-system, BlinkMacSystemFont, 'SF Mono', monospace;
        font-size: 0.95em;
        display: inline-block;
        margin: 0 2px;
        border: 1px solid #B3D9FF;
        transition: all 0.2s ease;
      }
      
      .medication-dose:hover {
        transform: translateY(-1px);
        box-shadow: 0 2px 4px rgba(0, 102, 204, 0.2);
      }
      
      /* Important numbers - subtle emphasis */
      .stat-number {
        color: #0066CC;
        font-weight: 700;
        font-size: 1.05em;
      }
      
      /* Bold text - slightly darker for emphasis */
      .message-text b,
      .message-text strong {
        color: #1a1a1a;
        font-weight: 600;
      }
      
      /* Italic text - softer color */
      .message-text i,
      .message-text em {
        color: #666;
        font-style: italic;
      }
      
      /* Lists - clean with orange accents */
      .message-text ul {
        margin: 16px 0;
        padding-left: 24px;
      }
      
      .message-text ul li {
        margin-bottom: 8px;
        list-style: none;
        position: relative;
      }
      
      .message-text ul li::before {
        content: "•";
        position: absolute;
        left: -20px;
        color: #E89B4C;
        font-weight: bold;
        font-size: 1.2em;
      }
      
      /* User messages stay white */
      .message.user .message-text,
      .message.user .message-text * {
        color: white !important;
      }
      
      /* Warning box for "When to See Your Doctor" sections */
      .message-text .warning-box {
        background: #FFF8F0;
        border-left: 4px solid #E89B4C;
        border-radius: 4px;
        padding: 16px;
        margin: 12px 0;
      }
      
      .message-text .warning-box b,
      .message-text .warning-box strong {
        display: block;
        font-size: 14px;
        color: #C97A20;
        font-weight: 600;
        margin-bottom: 12px;
      }
      
      /* Auto-format medical sections with rich styling */
      
      /* Main title - first bold text gets special treatment */
      .message-text > b:first-child,
      .message-text > strong:first-child,
      .message-text > p:first-child > b:first-child,
      .message-text > p:first-child > strong:first-child {
        background: linear-gradient(135deg, #C97A20 0%, #E89B4C 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        font-size: 20px;
        font-weight: 800;
        display: inline-block;
        margin-bottom: 16px;
        letter-spacing: -0.5px;
        text-shadow: 0 1px 2px rgba(201, 122, 32, 0.1);
      }
      
      /* Section headers - any bold text after line breaks */
      .message-text br + b,
      .message-text br + strong,
      .message-text p > b:first-child,
      .message-text p > strong:first-child {
        display: inline-block;
        font-size: 16px;
        color: #C97A20;
        font-weight: 700;
        margin-top: 20px;
        margin-bottom: 12px;
        padding-left: 12px;
        position: relative;
      }
      
      /* Add decorative element before section headers */
      .message-text br + b::before,
      .message-text br + strong::before {
        content: "▸";
        position: absolute;
        left: 0;
        color: #E89B4C;
        font-size: 14px;
      }
      
      /* Enhanced list styling with gradient backgrounds */
      .message-text ul {
        background: linear-gradient(to right, #FDFBF9 0%, white 100%);
        border: 1px solid #E8D5C8;
        border-left: 4px solid transparent;
        border-image: linear-gradient(180deg, #C97A20, #E89B4C) 1;
        border-radius: 12px;
        padding: 20px 20px 20px 36px;
        margin: 20px 0;
        box-shadow: 0 2px 8px rgba(201, 122, 32, 0.08);
        position: relative;
        overflow: hidden;
      }
      
      /* Subtle pattern overlay for lists */
      .message-text ul::before {
        content: "";
        position: absolute;
        top: 0;
        right: 0;
        width: 100px;
        height: 100px;
        background: radial-gradient(circle, rgba(201, 122, 32, 0.03) 1px, transparent 1px);
        background-size: 20px 20px;
      }
      
      /* List items with enhanced styling */
      .message-text ul li {
        margin-bottom: 12px;
        list-style: none;
        position: relative;
        transition: transform 0.2s ease;
      }
      
      .message-text ul li:hover {
        transform: translateX(2px);
      }
      
      /* Animated bullet points */
      .message-text ul li::before {
        content: "•";
        position: absolute;
        left: -24px;
        color: #E89B4C;
        font-weight: bold;
        font-size: 1.4em;
        transition: all 0.3s ease;
      }
      
      .message-text ul li:hover::before {
        color: #C97A20;
        transform: scale(1.2);
      }
      
      /* Bold terms in lists get special treatment */
      .message-text ul li b,
      .message-text ul li strong {
        color: #2D241F;
        font-weight: 700;
        background: linear-gradient(to bottom, transparent 60%, rgba(232, 155, 76, 0.2) 60%);
        padding: 0 2px;
      }
      
      /* Important paragraphs with emphasis */
      .message-text p {
        color: #4A3F36;
        line-height: 1.8;
        margin: 12px 0;
      }
      
      /* First paragraph gets subtle emphasis */
      .message-text > p:first-of-type {
        font-size: 16px;
        color: #3A3028;
        font-weight: 500;
        padding: 12px;
        background: linear-gradient(135deg, rgba(248, 246, 243, 0.5) 0%, transparent 100%);
        border-radius: 8px;
        margin-bottom: 20px;
      }
      
      /* Special sections with colored backgrounds */
      .message-text .understanding-section {
        background: linear-gradient(135deg, #F8F6F3 0%, #F3EFE9 100%);
        border: 1px solid #E8D5C8;
        border-radius: 12px;
        padding: 18px;
        margin: 16px 0;
        position: relative;
        overflow: hidden;
      }
      
      .message-text .understanding-section::before {
        content: "💡";
        position: absolute;
        top: 12px;
        right: 12px;
        font-size: 20px;
        opacity: 0.5;
      }
      
      /* Add visual interest with hover effects */
      .message-text b:hover,
      .message-text strong:hover {
        text-decoration: underline;
        text-decoration-color: #E89B4C;
        text-decoration-thickness: 2px;
        text-underline-offset: 3px;
      }
      
      /* Dosage highlighting with animation */
      @keyframes pulse-dose {
        0% { transform: scale(1); }
        50% { transform: scale(1.05); }
        100% { transform: scale(1); }
      }
      
      .medication-dose:hover {
        animation: pulse-dose 0.5s ease;
      }
      
      /* Important numbers get color boost */
      .stat-number {
        background: linear-gradient(135deg, #0066CC, #0088FF);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        font-weight: 800;
        font-size: 1.1em;
      }
    </style>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
